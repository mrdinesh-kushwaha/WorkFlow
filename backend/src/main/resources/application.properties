# =============================================
# LOCAL DEV CONFIG (H2 in-memory database)
# For Railway/Production, set env var:
#   SPRING_PROFILES_ACTIVE=prod
# =============================================

server.port=${PORT:8080}

#spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.url=jdbc:h2:file:./data/taskdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:MyVerySecretKeyForTaskManagerApp2024SuperLong!@#$%^}
jwt.expiration=86400000

cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,https://taskflow-platform-production.up.railway.app}

logging.level.com.taskmanager=INFO

# OAuth2 client properties - provide dummy values to prevent initialization errors
# These will be overridden by profile-specific properties when a profile is active
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_SECRET:dummy}
spring.security.oauth2.client.registration.github.scope=user:email

app.frontend-url=${FRONTEND_URL:http://localhost:3000}
